\* Negative case. The acceptance rule is degraded to the endpoint-only check
\* that TwoScribeVerseRecoveryNetwork cannot distinguish from the epoch fence.
\* Expect TLC to report CommitCarriesCurrentEpochRoute violated, with a trace
\* in which a generation-0 route naming A commits after A regains writership
\* in generation 2. A clean run here means the harness has stopped testing
\* anything and must be repaired.
SPECIFICATION Spec

CONSTANTS
  Clients = {C1, C2}
  Scribes = {"A", "B"}
  RetryLimit = 2
  EnforceEpochFence = FALSE

SYMMETRY ClientSymmetry

INVARIANT TypeOK
INVARIANT EveryAppendMatchesPublishedAuthority
INVARIANT CommitCarriesCurrentEpochRoute
INVARIANT RecoveryGapHasNoWriter

CONSTRAINT NetworkBound

CHECK_DEADLOCK FALSE
