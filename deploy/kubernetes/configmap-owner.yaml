apiVersion: v1
kind: ConfigMap
metadata:
  name: scripture-owner-config
  labels:
    app.kubernetes.io/name: scripture
    app.kubernetes.io/component: owner
data:
  scripture.yaml: |
    # Requires existing Canon evidence. Does not bootstrap on apply.
    version: 1
    node:
      owner_id: "scripture-own-a!"
      advertise: "tcp://scripture-owner:9000"
    listener:
      bind: "0.0.0.0:9000"
    verse:
      journal_id: "scripture-jrnl!!"
      verse_id: "scripture-verse!"
      cohort_id: "scripture-cohrt!"
      writer_id: "scripture-wrtr!!"
    store:
      backend: r2
      endpoint: "https://REPLACE_WITH_ENDPOINT"
      bucket: "REPLACE_WITH_BUCKET"
      region: auto
      prefix: "scripture/deployments/REPLACE_WITH_PREFIX"
    metrics:
      status_bind: "0.0.0.0:9100"
