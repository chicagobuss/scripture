apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servingauthorities.scripture.dev
spec:
  group: scripture.dev
  scope: Namespaced
  names:
    plural: servingauthorities
    singular: servingauthority
    kind: ServingAuthority
    shortNames:
      - sauth
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .spec.display.state
        - name: Term
          type: string
          jsonPath: .spec.display.writerTerm
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - recordFormat
                - record
                - display
              properties:
                recordFormat:
                  type: string
                  enum:
                    - scripture-serving-authority-v1
                  description: Version of the base64-encoded canonical authority record.
                record:
                  type: string
                  minLength: 1
                  description: Base64-encoded canonical ServingAuthorityRecord bytes. This is the sole authority payload.
                display:
                  type: object
                  description: Advisory copies for kubectl only; the adapter validates them against record before use.
                  required:
                    - journal
                    - verse
                    - state
                    - writerTerm
                  properties:
                    journal:
                      type: string
                    verse:
                      type: string
                    state:
                      type: string
                    writerTerm:
                      type: string
      subresources: {}
