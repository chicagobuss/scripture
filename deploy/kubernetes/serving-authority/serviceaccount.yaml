# Example ServiceAccount for Scripture processes that read/CAS ServingAuthority.
# Bind with rbac.yaml. Do not embed kube contexts, R2 credentials, endpoints,
# or authority object names in Git.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scripture
  namespace: scripture-lab
---
# Example ConfigMap shape for non-secret process configuration mount.
# Personal namespaces, journal/verse IDs, and store prefixes stay outside Git.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scripture-config-example
  namespace: scripture-lab
data:
  scripture.yaml: |
    version: 1
    node:
      owner_id: "REPLACE-OWNER-16"
      advertise: "tcp://scripture:9000"
    listener:
      bind: "0.0.0.0:9000"
    verse:
      journal_id: "REPLACE-JOURNAL16"
      verse_id: "REPLACE-VERSE-16!"
      cohort_id: "REPLACE-COHORT-16"
      writer_id: "REPLACE-WRITER-16"
    store:
      backend: rustfs
      endpoint: "http://example-object-store:9000"
      bucket: "example"
      region: us-east-1
      prefix: "scripture/deployments/example"
    ha:
      mode: serving-authority
      authority_store:
        kind: kubernetes
        namespace: scripture-lab
    metrics:
      status_bind: "0.0.0.0:9100"
