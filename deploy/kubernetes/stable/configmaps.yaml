apiVersion: v1
kind: ConfigMap
metadata:
  name: scripture-config-a
  namespace: scripture-stable-REPLACE_RUN_ID
  labels:
    app.kubernetes.io/part-of: scripture
    scripture.dev/role: writer-a
data:
  scripture.yaml: |
    version: 1
    node:
      owner_id: "scripture-own-a!"
      advertise: "tcp://scripture-actor-a:9000"
    listener:
      bind: "0.0.0.0:9000"
    verse:
      journal_id: "scripture-jrnl!!"
      verse_id: "scripture-verse!"
      cohort_id: "scripture-cohrt!"
      writer_id: "scripture-wrtr!!"
    store:
      backend: rustfs
      endpoint: "http://rustfs:9000"
      bucket: "REPLACE_BUCKET"
      region: us-east-1
      prefix: "scripture/stable/REPLACE_RUN_ID"
    metrics:
      status_bind: "0.0.0.0:9100"
    ha:
      mode: serving-authority
      startup_role: bootstrap-if-empty
      initial_term: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scripture-config-b
  namespace: scripture-stable-REPLACE_RUN_ID
  labels:
    app.kubernetes.io/part-of: scripture
    scripture.dev/role: writer-b
data:
  scripture.yaml: |
    version: 1
    node:
      owner_id: "scripture-own-b!"
      advertise: "tcp://scripture-actor-b:9000"
    listener:
      bind: "0.0.0.0:9000"
    verse:
      journal_id: "scripture-jrnl!!"
      verse_id: "scripture-verse!"
      cohort_id: "scripture-cohrt!"
      writer_id: "scripture-wrtr!!"
    store:
      backend: rustfs
      endpoint: "http://rustfs:9000"
      bucket: "REPLACE_BUCKET"
      region: us-east-1
      prefix: "scripture/stable/REPLACE_RUN_ID"
    metrics:
      status_bind: "0.0.0.0:9100"
    ha:
      mode: serving-authority
      startup_role: standby
    admin:
      bind: "0.0.0.0:9200"
