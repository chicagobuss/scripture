apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  namespace: scripture-stable-REPLACE_RUN_ID
  labels:
    app.kubernetes.io/name: rustfs
    scripture.dev/purpose: dedicated-lab-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
    spec:
      nodeSelector:
        kubernetes.io/hostname: bignlittles
      containers:
        - name: rustfs
          image: rustfs/rustfs:1.0.0-beta.8
          imagePullPolicy: IfNotPresent
          args: ["--server-domains", "rustfs"]
          ports:
            - name: s3
              containerPort: 9000
          env:
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          emptyDir: {}
