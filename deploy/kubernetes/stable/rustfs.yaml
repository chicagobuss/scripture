apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  namespace: scripture-stable-REPLACE_RUN_ID
  labels:
    app.kubernetes.io/name: rustfs
    scripture.dev/purpose: dedicated-lab-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
    spec:
      nodeSelector:
        kubernetes.io/hostname: bignlittles
      containers:
        - name: rustfs
          image: REPLACE_RUSTFS_IMAGE
          imagePullPolicy: IfNotPresent
          # This lab uses path-style S3 through the in-cluster Service.
          # Do not set RUSTFS_SERVER_DOMAINS / --server-domains here: that
          # enables virtual-host routing and must exactly match the client
          # Host header (including port).
          ports:
            - name: s3
              containerPort: 9000
          env:
            # Keep this disposable lab store aligned with the RustFS profile
            # exercised by the correctness campaign.  It is intentionally
            # separate from Tracker storage and never a production claim.
            - name: RUSTFS_VOLUMES
              value: /data/rustfs0
            - name: RUSTFS_ADDRESS
              value: 0.0.0.0:9000
            - name: RUSTFS_CONSOLE_ADDRESS
              value: 0.0.0.0:9001
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
            - name: RUSTFS_OBS_LOGGER_LEVEL
              value: warn
            - name: RUSTFS_UNSAFE_BYPASS_DISK_CHECK
              value: "true"
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /data/rustfs0
          readinessProbe:
            httpGet:
              path: /health/ready
              port: s3
            initialDelaySeconds: 3
            periodSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          emptyDir: {}
