apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: daemon-to-rustfs
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scripture
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rustfs
      ports:
        - protocol: TCP
          port: 9000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: producer-to-writer
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scripture
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9100
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-to-b
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      scripture.dev/owner: b
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - protocol: TCP
          port: 9200
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rustfs-from-daemons
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scripture
      ports:
        - protocol: TCP
          port: 9000
