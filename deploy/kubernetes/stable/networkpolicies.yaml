apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: daemon-to-rustfs
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scripture
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rustfs
      ports:
        - protocol: TCP
          port: 9000
---
# Producer port: only release-drill producer clients (not any in-namespace source).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: producer-from-client
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scripture
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              scripture.dev/client: producer
      ports:
        - protocol: TCP
          port: 9000
---
# Read-only status/probes. Kubelet probe traffic is node-sourced; allow the
# status port without a pod from-selector. Do not use this pattern for admin.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: status-probes
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scripture
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - protocol: TCP
          port: 9100
---
# Admin promote on B: only release-drill admin clients.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-from-client
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      scripture.dev/owner: b
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              scripture.dev/client: admin
      ports:
        - protocol: TCP
          port: 9200
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rustfs-from-daemons
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scripture
      ports:
        - protocol: TCP
          port: 9000
