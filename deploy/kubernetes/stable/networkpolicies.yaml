apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: daemon-to-rustfs
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scripture
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rustfs
      ports:
        - protocol: TCP
          port: 9000
---
# Producer port: only release-drill producer clients (not any in-namespace source).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: producer-from-client
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scripture
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              scripture.dev/client: producer
      ports:
        - protocol: TCP
          port: 9000
---
# Read-only status/probes. Kubelet probe traffic is node-sourced; allow the
# status port without a pod from-selector. Do not use this pattern for admin.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: status-probes
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scripture
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - protocol: TCP
          port: 9100
---
# Admin promote on B: only release-drill admin clients.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-from-client
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      scripture.dev/owner: b
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              scripture.dev/client: admin
      ports:
        - protocol: TCP
          port: 9200
---
# Producer clients may reach the producer Service (and owner routes for stale probes).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: producer-client-egress
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      scripture.dev/client: producer
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scripture
      ports:
        - protocol: TCP
          port: 9000
---
# Admin clients may reach B's admin port only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-client-egress
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      scripture.dev/client: admin
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              scripture.dev/owner: b
      ports:
        - protocol: TCP
          port: 9200
---
# Reachability probes: egress only. Without scripture.dev/client=producer,
# producer ingress must still deny (proves NP is not egress-only theater).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: probe-producer-egress
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      scripture.dev/probe: producer-reach
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scripture
      ports:
        - protocol: TCP
          port: 9000
---
# Bucket init + Holylog oracle helpers may talk to the dedicated RustFS only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: store-helper-egress
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchExpressions:
      - key: scripture.dev/role
        operator: In
        values: ["bucket-init", "holylog-oracle"]
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rustfs
      ports:
        - protocol: TCP
          port: 9000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rustfs-from-daemons
  namespace: scripture-stable-REPLACE_RUN_ID
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scripture
        - podSelector:
            matchExpressions:
              - key: scripture.dev/role
                operator: In
                values: ["bucket-init", "holylog-oracle"]
      ports:
        - protocol: TCP
          port: 9000
