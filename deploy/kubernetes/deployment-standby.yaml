# Independent standby candidate. Distinct identity; does not self-promote.
# Do not select this Deployment from the owner Service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scripture-standby
  labels:
    app.kubernetes.io/name: scripture
    app.kubernetes.io/component: standby
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scripture
      app.kubernetes.io/component: standby
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scripture
        app.kubernetes.io/component: standby
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: scripture
                    app.kubernetes.io/component: owner
                topologyKey: kubernetes.io/hostname
      containers:
        - name: scripture
          image: scripture:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --config
            - /etc/scripture/scripture.yaml
          ports:
            - name: ingress
              containerPort: 9000
            - name: status
              containerPort: 9100
          envFrom:
            - secretRef:
                name: scripture-store-credentials
          volumeMounts:
            - name: config
              mountPath: /etc/scripture
              readOnly: true
          livenessProbe:
            httpGet:
              path: /livez
              port: status
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: status
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: scripture-standby-config
