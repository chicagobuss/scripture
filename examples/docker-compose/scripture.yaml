# Compose demo configuration: one Scribe, one Canon, one Verse, and a local
# named-volume backend. It is intentionally a single-host demonstration, not
# an HA or cloud-durability configuration.
version: 1

node:
  owner_id: "scripture-own-a!"
  advertise: "tcp://scripture:9000"

listener:
  bind: "0.0.0.0:9000"
  producer_wire_bind: "0.0.0.0:9001"

verse:
  journal_id: "scripture-jrnl!!"
  verse_id: "scripture-verse!"
  cohort_id: "scripture-cohrt!"
  writer_id: "scripture-wrtr!!"

store:
  backend: file
  path: "/var/lib/scripture"
  prefix: "compose-demo"

paths: {}

# The experimental Producer Wire client can use this edge outbox when invoked
# with `--config /etc/scripture/scripture.yaml`. A `spooled` receipt means the
# client has fsynced its stable envelope to this one Docker host's volume; it
# is not a Canon commit and does not survive loss of that host.
producer_spool:
  enabled: true
  kind: local
  path: "/var/lib/scripture/producer-spool"
  max_bytes: 1048576
  fsync: every_record
  on_full: reject
  loss_budget: 30s
  scribe_id: "compose-scribe-a"

metrics:
  status_bind: "0.0.0.0:9100"
