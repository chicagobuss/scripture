services:
  scripture:
    build:
      context: ../..
      dockerfile: examples/docker-compose/Dockerfile
    ports:
      - "9000:9000" # raw-lines listener
      - "9100:9100" # /livez, /readyz, /status
    volumes:
      - scripture-data:/var/lib/scripture
      - ./scripture.yaml:/etc/scripture/scripture.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9100/readyz"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 5s

volumes:
  scripture-data:
