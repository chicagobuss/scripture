# Experimental local rsyslog -> Scripture bridge.
#
# `confirmMessages=on` means rsyslog waits for stdout `OK` from the helper.
# The helper returns OK only after a committed native Producer Wire ACK. Any
# non-OK retains the message in this action queue for retry.

module(load="omprog")

template(name="ScriptureRsyslogJson" type="string" string="%jsonmesg%\n")

action(
  name="scripture_committed_bridge"
  type="omprog"
  binary="/usr/local/bin/scripture-rsyslog-omprog --scribe 127.0.0.1:9001 --outbox /var/lib/scripture/rsyslog-outbox --target canon/telemetry/verse/syslog --producer-id rsyslog-host-a01 --epoch 1"
  template="ScriptureRsyslogJson"
  confirmMessages="on"
  confirmTimeout="30000"
  reportFailures="on"
  forceSingleInstance="on"
  queue.type="LinkedList"
  queue.filename="scripture-omprog"
  queue.maxdiskspace="1g"
  queue.saveonshutdown="on"
  queue.workerThreads="1"
  action.resumeInterval="5"
  killUnresponsive="on"
  output="/var/log/rsyslog/scripture-omprog.log"
)
