# Example multi-assignment Scribe configuration (non-secret, redacted).
#
# Omits top-level listener/verse. Each assignment has its own ingress bind,
# advertised writer route, and exclusive VirtualLog register root derived from
# Canon/Verse as store.prefix/cv/{hex(canon)}/{hex(verse)}.
# Assignment id is an operator handle only — renaming it does not change the root.
# Per-assignment prefix override is not supported in v1.
# paths.spool_dir is intentionally unsupported for multi-assignment.
#
# Credentials via process environment only:
#   rustfs: RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY
#
# Start with:
#   scripture bootstrap --config … [--initial-term N]
#
# Targeted promote of one Verse on a multi-assignment standby scribe:
#   scripture promote --config multi-standby.yaml --assignment ID --candidate-term N
# Only that assignment receives promote-and-serve; siblings keep posture
# (standby remains a dormant candidate). Do not say “the scribe failed over.”
#
# No live SSH drill until deterministic multi-assignment HA tests are green.

version: 1

node:
  owner_id: "scripture-own-a!"
  advertise: "tcp://10.0.0.1:9000"

store:
  backend: rustfs
  endpoint: "http://REPLACE_WITH_RUSTFS_ENDPOINT"
  bucket: "scripture"
  region: us-east-1
  prefix: "scripture/drills/REPLACE_WITH_RUN_PREFIX"

ha:
  mode: serving-authority

metrics:
  status_bind: "127.0.0.1:9100"

scribe:
  limits:
    max_assignments: 4
    max_pending_bytes: 4194304
    max_pending_records: 1024
    max_concurrent_tasks: 256
  assignments:
    - id: telemetry-host-a
      canon: "telemetry-jrnl!!"
      verse: "telemetry-host-a"
      cohort_id: "telemetry-cohrt!"
      writer_id: "telemetry-wrtr!!"
      posture: bootstrap-if-empty
      advertise: "tcp://10.0.0.1:9001"
      ingress:
        bind: "10.0.0.1:9001"
    - id: audit-ingress
      canon: "audit-journal!!!"
      verse: "audit-ingress-0!"
      cohort_id: "audit-cohort!!!!"
      writer_id: "audit-writer!!!!"
      posture: bootstrap-if-empty
      advertise: "tcp://10.0.0.1:9002"
      ingress:
        bind: "10.0.0.1:9002"
