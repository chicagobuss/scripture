# Example HA bootstrap-if-empty serve config (non-secret).
version: 1
node:
  owner_id: "scripture-own-a!"
  advertise: "tcp://scripture-owner-a:9000"
listener:
  bind: "0.0.0.0:9000"
verse:
  journal_id: "scripture-jrnl!!"
  verse_id: "scripture-verse!"
  cohort_id: "scripture-cohrt!"
  writer_id: "scripture-wrtr!!"
store:
  backend: rustfs
  endpoint: "http://REPLACE_WITH_ENDPOINT:9000"
  bucket: "REPLACE_WITH_BUCKET"
  region: us-east-1
  prefix: "scripture/deployments/REPLACE_WITH_PREFIX"
metrics:
  status_bind: "0.0.0.0:9100"
ha:
  mode: serving-authority
  startup_role: bootstrap-if-empty
  initial_term: 1
