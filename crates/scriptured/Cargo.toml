[package]
name = "scriptured"
version = "0.1.0"
edition = "2024"
rust-version = "1.97"
description = "Lab-grade Scripture daemon transport adapters"
license = "MIT"
publish = false

[dependencies]
bytes.workspace = true
holylog.workspace = true
scripture = { path = "../scripture" }
scripture-service = { path = "../scripture-service" }
thiserror.workspace = true
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt", "sync"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }

[lints]
workspace = true
