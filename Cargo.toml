[workspace]
members = ["crates/protoscripture", "crates/scripture"]
resolver = "3"

[workspace.dependencies]
bytes = "1.12"
futures = "0.3"
holylog = { path = "../holylog" }
proptest = "1.9"
thiserror = "2.0"

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
unwrap_used = "deny"
