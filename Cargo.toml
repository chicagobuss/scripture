[workspace]
members = [
    "crates/protoscripture",
    "crates/scripture",
    "crates/scripture-service",
    "crates/scriptured",
]
resolver = "3"

[workspace.dependencies]
bytes = "1.12"
futures = "0.3"
holylog = { path = "../holylog" }
holylog-object-store = { path = "../holylog/crates/holylog-object-store" }
object_store = { version = "0.14", default-features = false }
proptest = "1.9"
thiserror = "2.0"
tokio = { version = "1.47", default-features = false }

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
unwrap_used = "deny"
